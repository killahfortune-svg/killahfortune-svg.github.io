<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Killah Fortune E-Commerce Features</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Killah Fortune Store</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#cart">Shopping Cart</a></li>
                <li><a href="#consultation">Book a Consultation</a></li>
                <li><a href="#preorder">Pre-Order</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="products">
            <h2>Products</h2>
            <!-- Product items go here -->
        </section>
        <section id="cart">
            <h2>Your Shopping Cart</h2>
            <!-- Shopping cart content will be dynamically generated here -->
        </section>
        <section id="consultation">
            <h2>Book a Consultation</h2>
            <form>
                <label for="consultationDate">Select Date:</label>
                <input type="date" id="consultationDate" name="consultationDate">
                <button type="submit">Book Now</button>
            </form>
        </section>
        <section id="preorder">
            <h2>Pre-Order Feature</h2>
            <form>
                <label for="preorderItem">Select Item:</label>
                <input type="text" id="preorderItem" name="preorderItem" required>
                <button type="submit">Pre-Order</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Killah Fortune. All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
