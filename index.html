<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Site</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our E-commerce Site</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Consultations</a></li>
                <li><a href="#">Pre-Orders</a></li>
                <li><a href="#">Cart (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="products">
            <h2>Products</h2>
            <!-- Product items will be added here dynamically -->
        </section>
        <section id="checkout" style="display:none;">
            <h2>Checkout</h2>
            <form id="payment-form">
                <div id="card-element"></div>
                <button id="submit">Pay</button>
                <div id="payment-result"></div>
            </form>
        </section>
        <section id="consultation">
            <h2>Book a Consultation</h2>
            <form id="consultation-form">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <button type="submit">Book Now</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 E-commerce Site. All rights reserved.</p>
    </footer>
    <script>
        // Shopping Cart Logic
        let cart = [];
        function addToCart(product) {
            cart.push(product);
            document.getElementById('cart-count').innerText = cart.length;
        }

        // Stripe Payment Integration
        const stripe = Stripe('YOUR_PUBLIC_STRIPE_KEY');
        const paymentForm = document.getElementById('payment-form');
        paymentForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const {error} = await stripe.redirectToCheckout({
                // Stripe checkout session creation logic here
            });
            if (error) {
                document.getElementById('payment-result').innerText = error.message;
            }
        });

        // Consultation Form Submission Logic
        document.getElementById('consultation-form').addEventListener('submit', (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value;
            // Email automation logic here
            alert('Consultation booked for ' + email);
        });
    </script>
</body>
</html>
